name: Secret Scan

# Defense-in-depth: catch any credential before it reaches the public default
# branch. Runs on every push and PR. Scans the full history on the default
# branch so a secret introduced in an old commit is still surfaced.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for a complete scan
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional org/license key for the GitHub Action; not required for OSS public repos.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
