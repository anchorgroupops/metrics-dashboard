name: CI

# Build/quality gate for PRs and the default branch. Pairs with the gitleaks
# secret-scan workflow to give branch protection two checks to require:
# `test` (this) and `gitleaks` (secret-scan.yml).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
