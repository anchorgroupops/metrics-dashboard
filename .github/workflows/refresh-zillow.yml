name: Refresh Zillow Metrics

# Always-on (24/7) cloud automation — runs on GitHub's schedule regardless of
# any PC or the Pi. Observational: pulls FUB, computes team metrics, commits the
# public zillow-metrics.json. Sends no email/notice/correspondence.
on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-zillow
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r pipeline/requirements.txt
      - name: Compute Zillow metrics from FUB
        env:
          FUB_API_KEY: ${{ secrets.FUB_API_KEY }}
          FUB_X_SYSTEM: ${{ secrets.FUB_X_SYSTEM }}
          FUB_X_SYSTEM_KEY: ${{ secrets.FUB_X_SYSTEM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -o pipefail
          python pipeline/publish_zillow_metrics.py zillow-metrics.json
      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain zillow-metrics.json)" ]; then
            BRANCH="bot/zillow-$(date +%Y%m%d-%H%M)"
            git config user.name  "anchor-metrics-bot"
            git config user.email "actions@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add zillow-metrics.json
            git commit -m "chore: refresh zillow-metrics.json (live FUB)"
            git push origin "$BRANCH"
            PR_URL=$(gh pr create \
              --title "chore: refresh zillow-metrics.json" \
              --body "Automated 4-hour refresh from FUB pipeline. Auto-merges once checks pass." \
              --base main \
              --head "$BRANCH")
            gh pr merge "$PR_URL" --auto --merge
            echo "PR opened and auto-merge enabled: $PR_URL"
          else
            echo "No change in Zillow metrics."
          fi
