<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F7ECE1">
<link rel="icon" href="favicon.png">
<title>Anchor Metrics</title>
<style>
  :root{
    --sand:#F7ECE1; --sand2:#efe3d4; --teal:#046568; --teal2:#2aa7a0; --aqua:#82C8C3;
    --green:#5FB87A; --red:#C0392B; --amber:#d98c1f;
    --ink:#1b2624; --mut:#7c8a87; --card:#ffffff; --line:#ece2d4;
    --shadow:0 1px 3px rgba(4,101,104,.07),0 6px 18px rgba(4,101,104,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--sand);color:var(--ink);
       font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .hidden{display:none!important}
  img{max-width:100%}
  /* ── Login ── */
  #login{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  #login img.brand{width:180px;margin-bottom:22px}
  .lcard{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:28px 22px;width:100%;max-width:370px}
  .lcard h1{font-size:21px;font-weight:800;margin-bottom:3px}
  .lcard p{font-size:14px;color:var(--mut);margin-bottom:18px}
  label{display:block;font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 6px}
  input{width:100%;font-size:16px;padding:14px 15px;border:1.5px solid var(--line);border-radius:12px;background:#fff;outline:none}
  input:focus{border-color:var(--teal)}
  .btn{width:100%;font-size:16px;font-weight:700;padding:15px;border:none;border-radius:12px;background:var(--teal);color:#fff;cursor:pointer;margin-top:18px;min-height:52px}
  .btn:active{background:#03575a}
  .err{color:var(--red);font-size:13px;font-weight:600;margin-top:12px;min-height:18px;text-align:center}
  /* ── Header ── */
  header{background:var(--card);border-bottom:1px solid var(--line);padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
         position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:12px}
  header img.logo{height:30px}
  .signout{background:var(--sand);color:var(--teal);border:1px solid var(--line);border-radius:10px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;min-height:42px}
  .signout:active{background:var(--sand2)}
  .profile{display:flex;align-items:center;gap:11px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--line)}
  .avatar{width:42px;height:42px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0}
  .profile .nm{font-weight:800;font-size:16px;line-height:1.1}
  .profile .role{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal2);margin-top:2px}
  main{padding:14px 14px 48px;max-width:680px;margin:0 auto}
  .sec{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:18px 4px 10px;display:flex;align-items:center;gap:8px}
  .sec .ct{font-size:10px;background:var(--sand2);color:var(--teal);padding:2px 8px;border-radius:20px}
  /* ── Gauge grid ── */
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:520px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .gcard{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px 12px 12px;text-align:center}
  .gcard .lab{font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--mut)}
  .gcard canvas{display:block;width:100%;height:118px;margin:4px 0 0}
  .gcard .badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 11px;border-radius:20px;margin-top:2px}
  .badge.green{background:rgba(95,184,122,.16);color:#3f8f5b}
  .badge.teal{background:rgba(4,101,104,.13);color:var(--teal)}
  .badge.red{background:rgba(192,57,43,.12);color:var(--red)}
  .badge.cyan{background:rgba(130,200,195,.2);color:#2f9e96}
  .badge.na{background:rgba(124,138,135,.14);color:var(--mut)}
  /* ── Agent rows (admin all-agents + mentees) ── */
  .alist{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .arow{padding:13px 14px;border-bottom:1px solid var(--line)}
  .arow:last-child{border-bottom:none}
  .ahead{display:flex;align-items:center;gap:11px;cursor:pointer;min-height:46px}
  .arow .nm{font-weight:700;font-size:15px;flex:1;min-width:0}
  .arow .tt{font-size:12px;color:var(--mut);font-weight:500}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .chip{font-size:12px;font-weight:700;padding:5px 10px;border-radius:9px;display:flex;align-items:center;gap:5px;background:var(--sand)}
  .chip .k{font-weight:600;color:var(--mut);font-size:11px}
  .chip .dot{width:8px;height:8px;border-radius:50%}
  .chev{color:var(--mut);font-size:13px;transition:transform .15s}
  .arow.open .chev{transform:rotate(90deg)}
  .agauges{display:none;margin-top:10px}
  .arow.open .agauges{display:block}
  .legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;font-size:11px;color:var(--mut);margin:16px 4px 4px}
  .legend span{display:flex;align-items:center;gap:5px}
  .ldot{width:9px;height:9px;border-radius:50%}
  .foot{text-align:center;font-size:11px;color:var(--mut);margin-top:18px;line-height:1.7}
  .spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:s .8s linear infinite;margin:44px auto}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <img class="brand" src="anchor-logo.png" alt="The Anchor Group">
  <div class="lcard">
    <h1>Performance Portal</h1>
    <p>Sign in with your Anchor Group work email.</p>
    <form id="loginForm">
      <label for="email">Work Email</label>
      <input id="email" type="email" inputmode="email" autocomplete="username" placeholder="you@anchorgroup.com" required>
      <label for="pw">Password</label>
      <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" required>
      <button class="btn" type="submit" id="loginBtn">Sign In</button>
    </form>
    <div class="err" id="loginErr"></div>
  </div>
  <div class="foot">You only ever see your own metrics. Read-only.</div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <img class="logo" src="anchor-logo.png" alt="The Anchor Group">
    <button class="signout" id="signout">Sign out</button>
  </header>
  <div class="profile">
    <div class="avatar" id="pAv">–</div>
    <div><div class="nm" id="pNm">—</div><div class="role" id="pRole">—</div></div>
  </div>
  <main>
    <div id="content"><div class="spin"></div></div>
    <div class="legend">
      <span><i class="ldot" style="background:#C0392B"></i>Below Min</span>
      <span><i class="ldot" style="background:#046568"></i>Above Min</span>
      <span><i class="ldot" style="background:#5FB87A"></i>Best of Zillow</span>
      <span><i class="ldot" style="background:#82C8C3"></i>Elite</span>
    </div>
    <div class="foot">Zillow Preferred · month-to-date · live from Follow Up Boss<br><span id="stamp"></span></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<script>
const SB_URL='https://zedujsbhqjxzjjmyjhok.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplZHVqc2JocWp4empqbXlqaG9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MzA4MDQsImV4cCI6MjA5NjUwNjgwNH0.9yc0dim0qUtcy6l-SJxq8pOoeexq5VA2zzmUCpfoR3I';
const sb=supabase.createClient(SB_URL,SB_ANON,{auth:{persistSession:true,autoRefreshToken:true}});
const PERIOD='2026-06';
const METRICS=[
  {key:'appt',  label:'Appointments', target:0.30, dir:'higher', unit:'percent'},
  {key:'pickup',label:'Pickup Rate',  target:0.25, dir:'higher', unit:'percent'},
  {key:'speed', label:'Speed to Lead',target:120,  dir:'lower',  unit:'seconds'},
];
const ZP={red:'#C0392B',teal:'#046568',green:'#5FB87A',cyan:'#82C8C3'};
const ZP_CLS=['red','teal','green','cyan'], ZP_LAB=['Below Min','Above Min','Best of Zillow','Elite'];
const $=id=>document.getElementById(id);
const fmt=(v,u)=>v==null?'—':u==='percent'?(v*100).toFixed(0)+'%':u==='seconds'?(v<60?Math.round(v)+'s':v<3600?Math.round(v/60)+'m':(v/3600).toFixed(1)+'h'):''+v;

function fr(target,dir){
  let bad,good,toF;
  if(dir==='lower'){good=0;bad=target/0.9;const s=(bad-good)||1;toF=v=>Math.max(0,Math.min(1,(bad-v)/s));}
  else{const el=target*2.5;good=el*1.12;bad=Math.max(0,(target-0.1*good)/0.9);const s=(good-bad)||1;toF=v=>Math.max(0,Math.min(1,(v-bad)/s));}
  return {toF,t:0.10,b:Math.max(0.12,Math.min(0.92,toF(dir==='lower'?target*0.6:target*1.5))),e:Math.max(0.16,Math.min(0.98,toF(dir==='lower'?target*0.4:target*2.5)))};
}
function zoneIdx(m){ if(m.value==null)return -1; const p=fr(m.target,m.dir),v=p.toF(m.value); return v<p.t?0:v<p.b?1:v<p.e?2:3; }
function drawGauge(cv,m){
  const dpr=window.devicePixelRatio||1,W=cv.clientWidth||220,H=cv.clientHeight||118;
  cv.width=W*dpr;cv.height=H*dpr;const x=cv.getContext('2d');x.scale(dpr,dpr);x.clearRect(0,0,W,H);
  const cx=W/2,cy=H*0.84,r=Math.min(W*0.42,H*0.82),lw=r*0.2;
  x.beginPath();x.arc(cx,cy,r,Math.PI,2*Math.PI);x.strokeStyle='#ece3d7';x.lineWidth=lw;x.lineCap='butt';x.stroke();
  if(m.value==null){
    x.fillStyle='#9aa6a4';x.font=`800 ${Math.round(r*0.22)}px Segoe UI,sans-serif`;x.textAlign='center';x.textBaseline='middle';x.fillText('N/A',cx,cy-r*0.2);
    return {cls:'na',lab:'Not Available'};
  }
  const p=fr(m.target,m.dir),bd=[0,p.t,p.b,p.e,1],cols=[ZP.red,ZP.teal,ZP.green,ZP.cyan];
  for(let i=0;i<4;i++){if(bd[i+1]-bd[i]<0.004)continue;x.beginPath();x.arc(cx,cy,r,Math.PI+bd[i]*Math.PI,Math.PI+bd[i+1]*Math.PI);x.strokeStyle=cols[i];x.lineWidth=lw;x.stroke();}
  const vf=p.toF(m.value),zi=vf<p.t?0:vf<p.b?1:vf<p.e?2:3,va=Math.PI+vf*Math.PI,nl=r*0.78,tx=cx+nl*Math.cos(va),ty=cy+nl*Math.sin(va);
  x.beginPath();x.moveTo(cx,cy);x.lineTo(tx,ty);x.strokeStyle=cols[zi];x.lineWidth=3;x.lineCap='round';x.stroke();
  x.beginPath();x.arc(cx,cy,lw*0.3,0,7);x.fillStyle=cols[zi];x.fill();x.beginPath();x.arc(cx,cy,lw*0.14,0,7);x.fillStyle='#fff';x.fill();
  x.fillStyle=cols[zi];x.font=`800 ${Math.round(r*0.32)}px Segoe UI,sans-serif`;x.textAlign='center';x.textBaseline='middle';x.fillText(fmt(m.value,m.unit),cx,cy-r*0.14);
  return {cls:ZP_CLS[zi],lab:ZP_LAB[zi]};
}
function gaugeGrid(valsByKey){
  const g=document.createElement('div');g.className='grid';
  METRICS.forEach(d=>{
    const v=valsByKey[d.key];
    const c=document.createElement('div');c.className='gcard';
    c.innerHTML=`<div class="lab">${d.label}</div><canvas></canvas><div class="badge na">—</div>`;
    requestAnimationFrame(()=>{const z=drawGauge(c.querySelector('canvas'),{...d,value:v==null?null:v});const b=c.querySelector('.badge');b.className='badge '+z.cls;b.textContent=z.lab;});
    g.appendChild(c);
  });
  return g;
}
function chips(valsByKey){
  const w=document.createElement('div');w.className='chips';
  METRICS.forEach(d=>{
    const v=valsByKey[d.key], zi=zoneIdx({...d,value:v==null?null:v});
    const col=zi<0?'#c8cfcd':[ZP.red,ZP.teal,ZP.green,ZP.cyan][zi];
    const c=document.createElement('div');c.className='chip';
    c.innerHTML=`<span class="dot" style="background:${col}"></span><span class="k">${d.label.split(' ')[0]}</span> ${fmt(v==null?null:v,d.unit)}`;
    w.appendChild(c);
  });
  return w;
}

async function metricsFor(agentId){
  const {data}=await sb.from('agent_metrics').select('metric_key,value,target').eq('agent_id',agentId).eq('period',PERIOD);
  const m={};(data||[]).forEach(r=>m[r.metric_key]=r.value);return m;
}
async function teamMetrics(){
  try{const r=await fetch('zillow-metrics.json?t='+Date.now(),{cache:'no-store'});
    if(r.ok){const d=await r.json();const m={};['pickup','speed','appt'].forEach(k=>{if(d.metrics&&d.metrics[k])m[k]=d.metrics[k].value;});if(Object.keys(m).length)return m;}}catch(e){}
  const {data}=await sb.from('team_averages').select('metric_key,team_avg').eq('period',PERIOD);
  const m={};(data||[]).forEach(r=>m[r.metric_key]=r.team_avg);return m;
}
function agentRow(a, vals, expandable){
  const row=document.createElement('div');row.className='arow';
  const ini=(a.name||'?').trim().split(/\s+/).map(s=>s[0]).slice(0,2).join('');
  row.innerHTML=`<div class="ahead"><div class="avatar" style="width:36px;height:36px;font-size:14px">${ini}</div>`+
    `<div class="nm">${a.name}<div class="tt">${a.title||'Agent'}</div></div>`+(expandable?'<span class="chev">›</span>':'')+`</div>`;
  row.querySelector('.ahead').after(chips(vals));
  if(expandable){
    const g=document.createElement('div');g.className='agauges';g.appendChild(gaugeGrid(vals));row.appendChild(g);
    row.querySelector('.ahead').onclick=()=>row.classList.toggle('open');
  }
  return row;
}
function secLabel(text,ct){const d=document.createElement('div');d.className='sec';d.innerHTML=text+(ct!=null?` <span class="ct">${ct}</span>`:'');return d;}

async function buildOwn(c, me, team){
  c.appendChild(secLabel('Your metrics'));
  c.appendChild(gaugeGrid(await metricsFor(me.agent_id)));
  c.appendChild(secLabel('Team average'));
  c.appendChild(gaugeGrid(team));
}
async function buildMentees(c, me, agents){
  const mentees=agents.filter(a=>a.agent_id!==me.agent_id && (a.mentor_email||'').toLowerCase()===(me.email||'').toLowerCase());
  if(!mentees.length)return;
  c.appendChild(secLabel('Your crew',mentees.length));
  const list=document.createElement('div');list.className='alist';
  for(const a of mentees) list.appendChild(agentRow(a, await metricsFor(a.agent_id), true));
  c.appendChild(list);
}
async function buildAdmin(c, agents, team){
  c.appendChild(secLabel('Team overview', 'all agents'));
  c.appendChild(gaugeGrid(team));
  const roster=agents.filter(a=>!a.is_admin).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  c.appendChild(secLabel('Every agent', roster.length));
  const list=document.createElement('div');list.className='alist';
  for(const a of roster) list.appendChild(agentRow(a, await metricsFor(a.agent_id), true));
  c.appendChild(list);
}

async function boot(session){
  $('login').classList.add('hidden');$('app').classList.remove('hidden');
  const email=session.user.email, c=$('content');
  const {data:agents,error}=await sb.from('agents').select('*');
  if(error){c.innerHTML='<div class="foot">Could not load metrics: '+error.message+'</div>';return;}
  const me=(agents||[]).find(a=>(a.email||'').toLowerCase()===email.toLowerCase());
  const mentees=(agents||[]).filter(a=>me&&a.agent_id!==me.agent_id&&(a.mentor_email||'').toLowerCase()===(me.email||'').toLowerCase());
  const role = (me&&me.is_admin)?'admin' : (mentees.length?'lead':'agent');
  $('pAv').textContent=(me?me.name:email).trim()[0].toUpperCase();
  $('pNm').textContent=me?me.name:email;
  $('pRole').textContent=role==='admin'?'Admin · All agents':role==='lead'?'Crew Lead':'Agent';
  $('stamp').textContent='Signed in as '+email;
  const team=await teamMetrics();
  c.innerHTML='';
  if(role==='admin'){ await buildAdmin(c, agents, team); }
  else if(role==='lead'){ await buildOwn(c, me, team); await buildMentees(c, me, agents); }
  else if(me){ await buildOwn(c, me, team); }
  else { c.appendChild(secLabel('Team average')); c.appendChild(gaugeGrid(team));
         const n=document.createElement('div');n.className='foot';n.textContent='No agent record linked to '+email+' yet — ask your admin to add you.';c.appendChild(n); }
}

$('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();$('loginErr').textContent='';$('loginBtn').textContent='Signing in…';
  const {data,error}=await sb.auth.signInWithPassword({email:$('email').value.trim().toLowerCase(),password:$('pw').value});
  $('loginBtn').textContent='Sign In';
  if(error){$('loginErr').textContent=error.message;return;}
  boot(data.session);
});
$('signout').addEventListener('click',async()=>{await sb.auth.signOut();location.reload();});
sb.auth.getSession().then(({data})=>{if(data.session)boot(data.session);});
</script>
</body>
</html>
